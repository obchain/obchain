name: Update Profile README

on:
  push:
    branches: [main]
  schedule:
    # 5:54 AM IST (00:24 UTC)
    - cron: '24 0 * * *'
    # 5:54 PM IST (12:24 UTC)
    - cron: '24 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-readme
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Regenerate Protocol Contributions section
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/update_contributions.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- README.md; then
            echo "README unchanged — skipping commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore(readme): auto-update protocol contributions"
          git push
